<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Elizabeth ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&display=swap');

        :root { --bg-color: #050505; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; color: white;
        }

        #particle-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        #ui-layer {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        #start-screen {
            display: flex; flex-direction: column; align-items: center;
            transition: opacity 0.8s ease;
        }

        .loader {
            display: none;
            border: 4px solid rgba(255, 75, 139, 0.3);
            border-top: 4px solid #ff4b8b;
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        button {
            padding: 15px 40px; font-size: 1.2rem; font-weight: 600;
            background: linear-gradient(135deg, #ff4b8b, #ff2a75);
            color: white; border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 10px 25px rgba(255, 75, 139, 0.5);
            transition: all 0.3s ease;
        }

        #scene-container {
            display: none; flex-direction: column; align-items: center;
            justify-content: center; width: 90%; max-width: 900px;
            opacity: 0; transition: opacity 1.5s ease-in-out;
        }

        #scene-image {
            max-width: 100%; max-height: 55vh; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            object-fit: cover; transition: opacity 1s ease-in-out;
            animation: float 6s ease-in-out infinite;
        }

        .glass-panel {
            margin-top: -30px; background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 25px; text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); z-index: 2;
        }

        #scene-message {
            font-family: 'Dancing Script', cursive; font-size: 3rem;
            margin: 0; transition: all 1s ease;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div id="ui-layer">
        <div id="start-screen">
            <div class="loader" id="loader"></div>
            <button id="start-btn" onclick="initExperience()">Toca aquí para una sorpresa, Elizabeth</button>
        </div>

        <div id="scene-container">
            <img id="scene-image" src="" alt="Cargando...">
            <div class="glass-panel">
                <p id="scene-message"></p>
            </div>
        </div>
    </div>

    <script>
        let scenes = [];
        let currentSceneIndex = 0;

        async function initExperience() {
            const btn = document.getElementById('start-btn');
            const loader = document.getElementById('loader');
            const startScreen = document.getElementById('start-screen');
            
            btn.style.display = 'none';
            loader.style.display = 'block';

            try {
                const response = await fetch('/api/scenes');
                if (!response.ok) throw new Error('No se pudo obtener la respuesta del servidor');
                
                scenes = await response.json();

                // OCULTAR INICIO E INICIAR SHOW
                startScreen.style.opacity = '0';
                setTimeout(() => {
                    startScreen.style.display = 'none';
                    startShow();
                }, 800);

            } catch (error) {
                console.error("Error crítico:", error);
                alert("Hubo un problema de conexión con el servidor.");
                btn.style.display = 'block';
                loader.style.display = 'none';
            }
        }

        function startShow() {
            const container = document.getElementById('scene-container');
            container.style.display = 'flex';
            setTimeout(() => {
                container.style.opacity = '1';
                renderScene();
            }, 50);
        }

        function renderScene() {
    if (currentSceneIndex >= scenes.length) return;

    const sceneData = scenes[currentSceneIndex];
    const imgElement = document.getElementById('scene-image');
    const msgElement = document.getElementById('scene-message');

    imgElement.style.opacity = '0';
    msgElement.style.opacity = '0';

    setTimeout(() => {
        // Añadimos un "timestamp" para evitar que el navegador use una versión vieja fallida
        const optimizedSrc = sceneData.image.includes('http') 
            ? sceneData.image 
            : sceneData.image + "?t=" + new Date().getTime();
        
        console.log("Intentando cargar:", optimizedSrc);
        
        imgElement.src = optimizedSrc;
        msgElement.innerHTML = sceneData.text;
        msgElement.style.color = sceneData.color;

        // Forzamos la visibilidad
        imgElement.onload = () => {
            imgElement.style.opacity = '1';
            msgElement.style.opacity = '1';
        };

        setTimeout(() => {
            currentSceneIndex++;
            if(currentSceneIndex < scenes.length) {
                renderScene();
            }
        }, sceneData.duration);
    }, 800);
}

        // MOTOR DE PARTÍCULAS
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height + canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedY = Math.random() * -1 - 0.5;
                this.color = `rgba(255, 182, 193, ${Math.random() * 0.5 + 0.2})`;
            }
            update() {
                this.y += this.speedY;
                if (this.y < -20) this.y = canvas.height + 20;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 100; i++) particlesArray.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particlesArray.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
